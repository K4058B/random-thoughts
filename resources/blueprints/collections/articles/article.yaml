title: Article
tabs:
  main:
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: image
            field:
              type: assets
              container: assets
              max_files: 1
              display: Image
              validate:
                - required
          -
            handle: lead
            field:
              type: textarea
              display: Lead
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
